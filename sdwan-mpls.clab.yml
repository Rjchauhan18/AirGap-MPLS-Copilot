name: sdwan-mpls-core

topology:
  defaults:
    kind: linux
    image: frrouting/frr:latest

  nodes:
    # ---------------------------------------------
    # UNDERLAY: MPLS / ISP PROVIDER CORE
    # ---------------------------------------------
    p-core:
      sysctls:
        net.ipv4.ip_forward: 1
      binds:
        - ./config/p-core/daemons:/etc/frr/daemons
        - ./config/p-core/frr.conf:/etc/frr/frr.conf
    pe-dc:
      sysctls:
        net.ipv4.ip_forward: 1
      binds:
        - ./config/pe-dc/daemons:/etc/frr/daemons
        - ./config/pe-dc/frr.conf:/etc/frr/frr.conf
    pe-br:
      sysctls:
        net.ipv4.ip_forward: 1
      binds:
        - ./config/pe-br/daemons:/etc/frr/daemons
        - ./config/pe-br/frr.conf:/etc/frr/frr.conf

    # ---------------------------------------------
    # OVERLAY: ENTERPRISE SD-WAN EDGES (CE)
    # ---------------------------------------------
    edge-dc:
      sysctls:
        net.ipv4.ip_forward: 1
      binds:
        - ./config/edge-dc/daemons:/etc/frr/daemons
        - ./config/edge-dc/frr.conf:/etc/frr/frr.conf
    edge-br:
      sysctls:
        net.ipv4.ip_forward: 1
      binds:
        - ./config/edge-br/daemons:/etc/frr/daemons
        - ./config/edge-br/frr.conf:/etc/frr/frr.conf

    # ---------------------------------------------
    # END WORKLOADS & TRAFFIC GENERATORS
    # ---------------------------------------------
    host-dc:
      image: alpine:latest
      exec:
        - apk add --no-cache iperf3 iproute2-minimal
        - ip addr add 192.168.1.10/24 dev eth1
        - ip route add 192.168.2.0/24 via 192.168.1.1
    host-br:
      image: alpine:latest
      exec:
        - apk add --no-cache iperf3 iproute2-minimal
        - ip addr add 192.168.2.10/24 dev eth1
        - ip route add 192.168.1.0/24 via 192.168.2.1

  links:
    - endpoints: ["pe-dc:eth1", "p-core:eth1"]
    - endpoints: ["pe-br:eth1", "p-core:eth2"]
    - endpoints: ["edge-dc:eth1", "pe-dc:eth2"]
    - endpoints: ["edge-br:eth1", "pe-br:eth2"]
    - endpoints: ["host-dc:eth1", "edge-dc:eth2"]
    - endpoints: ["host-br:eth1", "edge-br:eth2"]
